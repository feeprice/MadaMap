<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Madagascar Fady Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
font-family:Arial;
}

#map{
width:100%;
height:100vh;
}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:white;
padding:8px 12px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

#searchInput{
padding:5px;
width:200px;
}
</style>
</head>

<body>

<div id="searchBox">
<input id="searchInput" placeholder="Search Madagascar location">
<button id="searchBtn">Go</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// =========================
// FIREBASE
// =========================

const firebaseConfig = {
apiKey: "AIzaSyAzazHrR1MZycLSVFaf3SJWbioZRaqhm7U",
authDomain: "mada-map-cc473.firebaseapp.com",
projectId: "mada-map-cc473",
storageBucket: "mada-map-cc473.firebasestorage.app",
messagingSenderId: "575563718533",
appId: "1:575563718533:web:3df319306689f753102eec"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// =========================
// MAP SETUP
// =========================

const madagascarBounds = [[-25.6,43.2],[-11.5,50.5]];

const map = L.map("map",{
maxBounds: madagascarBounds,
maxBoundsViscosity:1.0,
minZoom:5,
maxZoom:12
}).setView([-18.7669,46.8691],6);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"© OpenStreetMap contributors"}
).addTo(map);


// =========================
// DRAW LAYER
// =========================

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({

draw:{
polygon:true,
rectangle:true,
marker:true,
circle:false,
polyline:false
},

edit:{
featureGroup: drawnItems
}

});

map.addControl(drawControl);


// =========================
// CREATE SHAPE
// =========================

map.on(L.Draw.Event.CREATED, async function(e){

const layer = e.layer;

const description = prompt("Enter Fady description:");

if(!description) return;

layer.bindPopup("<b>Fady:</b> "+description);

drawnItems.addLayer(layer);

const geojson = JSON.stringify(layer.toGeoJSON());

try{

const docRef = await db.collection("fady").add({

geojson: geojson,
fady: description

});

layer.firestoreId = docRef.id;

console.log("Saved:",docRef.id);

}catch(err){

console.error("Save error:",err);

}

});


// =========================
// DELETE SHAPE
// =========================

map.on(L.Draw.Event.DELETED, async function(e){

const layers = e.layers;

layers.eachLayer(async function(layer){

if(layer.firestoreId){

await db.collection("fady")
.doc(layer.firestoreId)
.delete();

console.log("Deleted:",layer.firestoreId);

}

});

});


// =========================
// LOAD FROM FIRESTORE
// =========================

async function loadFady(){

const snapshot = await db.collection("fady").get();

snapshot.forEach(doc=>{

const data = doc.data();

const geojson = JSON.parse(data.geojson);

const geoLayer = L.geoJSON(geojson);

geoLayer.eachLayer(function(layer){

layer.bindPopup("<b>Fady:</b> "+data.fady);

layer.firestoreId = doc.id;

drawnItems.addLayer(layer);

});

});

}

loadFady();


// =========================
// SEARCH TOOL
// =========================

document.getElementById("searchBtn").onclick = async function(){

const query =
document.getElementById("searchInput").value
+ " Madagascar";

const url =
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(query);

const res = await fetch(url);

const data = await res.json();

if(data.length>0){

map.setView(
[parseFloat(data[0].lat),parseFloat(data[0].lon)],
10
);

}else{

alert("Location not found");

}

};

</script>

</body>
</html>
